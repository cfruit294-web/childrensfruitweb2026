services:
  - type: web
    name: childrensfruit
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python manage.py load_blog_data && gunicorn childrensfruit.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health/
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DATABASE_URL
        fromDatabase:
          name: childrensfruit-db
          property: connectionString
      # ── À remplir manuellement dans le dashboard Render ──────
      - key: YOUTUBE_API_KEY
        value: ""
      - key: YOUTUBE_CHANNEL
        value: "@CFRUIT24"
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: GOOGLE_CLIENT_SECRET
        value: ""
      - key: GOOGLE_REDIRECT_URI
        value: "https://childrensfruit.onrender.com/accounts/google/callback/"
      # ── Email SMTP LWS ───────────────────────────────────────
      - key: EMAIL_HOST
        value: "mail.childrensfruit.org"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        value: "info@childrensfruit.org"
      - key: EMAIL_HOST_PASSWORD
        value: ""
      - key: DEFAULT_FROM_EMAIL
        value: "Children's Fruit <info@childrensfruit.org>"
      # ── Cloudinary (media permanent) ─────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""

databases:
  - name: childrensfruit-db
    databaseName: childrensfruit
    plan: free
