{% extends 'core/base.html' %}
{% load static %}
{% block title %}Bible — Children's Fruit{% endblock %}
{% block extra_css %}
<style>
:root { --bible-bg: #0d1117; --bible-card: #161b22; --bible-border: #30363d; --bible-text: #e6edf3; --bible-muted: #8b949e; }
body { background: var(--bible-bg); color: var(--bible-text); }
.bible-wrap { display: flex; min-height: calc(100vh - 70px); }

/* Sidebar */
.bible-sidebar {
  width: 280px; flex-shrink: 0; background: var(--bible-card);
  border-right: 1px solid var(--bible-border);
  display: flex; flex-direction: column; height: calc(100vh - 70px);
  position: sticky; top: 70px; overflow: hidden;
}
.bible-sidebar-head {
  padding: 1rem; border-bottom: 1px solid var(--bible-border); flex-shrink: 0;
}
.bible-sidebar-head h6 { color: var(--green); font-weight: 700; margin: 0 0 .5rem; font-size: .85rem; letter-spacing: .05em; text-transform: uppercase; }
.bible-search-input {
  width: 100%; background: rgba(255,255,255,.06); border: 1px solid var(--bible-border);
  color: var(--bible-text); border-radius: 8px; padding: .4rem .75rem; font-size: .8rem; outline: none;
}
.bible-search-input:focus { border-color: var(--green); }
.bible-section-label {
  padding: .5rem 1rem .25rem; font-size: .65rem; color: var(--bible-muted);
  text-transform: uppercase; letter-spacing: .08em; font-weight: 600;
}
.book-list { overflow-y: auto; flex: 1; padding-bottom: 1rem; }
.book-btn {
  display: block; width: 100%; text-align: left; background: none; border: none;
  color: var(--bible-muted); padding: .35rem 1rem; font-size: .8rem; cursor: pointer;
  transition: all .15s; border-left: 2px solid transparent;
}
.book-btn:hover { color: var(--bible-text); background: rgba(255,255,255,.04); }
.book-btn.active { color: var(--green); background: rgba(0,104,55,.12); border-left-color: var(--green); font-weight: 600; }

/* Main reader */
.bible-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.bible-toolbar {
  background: var(--bible-card); border-bottom: 1px solid var(--bible-border);
  padding: .75rem 1.25rem; display: flex; gap: .75rem; flex-wrap: wrap; align-items: center;
  position: sticky; top: 70px; z-index: 10;
}
.bible-select {
  background: rgba(255,255,255,.07); border: 1px solid var(--bible-border);
  color: var(--bible-text); border-radius: 8px; padding: .35rem .75rem; font-size: .8rem; outline: none; cursor: pointer;
}
.bible-select:focus { border-color: var(--green); }
.bible-select option { background: #1c2128; }
.chapter-nav { display: flex; align-items: center; gap: .5rem; margin-left: auto; }
.ch-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--bible-border);
  background: rgba(255,255,255,.05); color: var(--bible-text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .75rem; transition: .15s;
}
.ch-btn:hover:not(:disabled) { background: rgba(0,104,55,.2); border-color: var(--green); color: var(--green); }
.ch-btn:disabled { opacity: .3; cursor: not-allowed; }
.ch-label { font-size: .8rem; color: var(--bible-muted); white-space: nowrap; }

/* Verses */
.bible-content { flex: 1; overflow-y: auto; padding: 2rem 2.5rem; max-width: 800px; margin: 0 auto; width: 100%; }
.bible-chapter-title { font-size: 1.5rem; font-weight: 700; color: var(--bible-text); margin-bottom: .25rem; }
.bible-book-label { font-size: .85rem; color: var(--green); font-weight: 600; margin-bottom: 2rem; letter-spacing: .02em; }
.verse-row { display: flex; gap: .75rem; margin-bottom: .75rem; padding: .5rem .75rem; border-radius: 8px; transition: background .15s; cursor: pointer; }
.verse-row:hover, .verse-row.highlighted { background: rgba(0,104,55,.12); }
.verse-num { font-size: .7rem; color: var(--green); font-weight: 700; min-width: 24px; padding-top: 3px; flex-shrink: 0; }
.verse-text { font-size: 1rem; line-height: 1.8; color: var(--bible-text); }
.verse-text.large { font-size: 1.15rem; }
.verse-text.small { font-size: .88rem; }
.bible-loading { text-align: center; padding: 4rem; color: var(--bible-muted); }
.bible-loading .spinner { width: 36px; height: 36px; border: 3px solid rgba(0,104,55,.3); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Copied toast */
.copy-toast {
  position: fixed; bottom: 2rem; right: 2rem; background: var(--green); color: #fff;
  padding: .6rem 1.2rem; border-radius: 8px; font-size: .82rem; font-weight: 600;
  opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 9999;
}
.copy-toast.show { opacity: 1; }

/* Font size controls */
.font-ctrl { display: flex; gap: .25rem; }
.font-ctrl button {
  background: rgba(255,255,255,.06); border: 1px solid var(--bible-border); color: var(--bible-text);
  width: 28px; height: 28px; border-radius: 6px; font-size: .75rem; cursor: pointer; transition: .15s;
}
.font-ctrl button:hover { border-color: var(--green); color: var(--green); }

/* Compare mode */
.compare-pane {
  display: none; width: 50%; border-left: 1px solid var(--bible-border);
  overflow-y: auto; padding: 2rem 1.5rem;
}
.compare-pane.active { display: block; }
.bible-reader-area { display: flex; flex: 1; overflow: hidden; }

/* Mobile */
@media (max-width: 768px) {
  .bible-sidebar { display: none; }
  .bible-content { padding: 1.25rem 1rem; }
  .bible-toolbar { gap: .4rem; }
  .compare-pane { display: none !important; }
}
</style>
{% endblock %}

{% block content %}
<div class="bible-wrap">

  <!-- Sidebar: book list -->
  <aside class="bible-sidebar">
    <div class="bible-sidebar-head">
      <h6><i class="fas fa-book-open me-1"></i>Livres de la Bible</h6>
      <input class="bible-search-input" id="bookSearch" type="text" placeholder="Rechercher un livre…" oninput="filterBooks(this.value)">
    </div>
    <div class="book-list" id="bookList">
      <div class="bible-section-label">Ancien Testament</div>
      <!-- books injected by JS -->
    </div>
  </aside>

  <!-- Main -->
  <div class="bible-main">

    <!-- Toolbar -->
    <div class="bible-toolbar">
      <!-- Translation -->
      <select class="bible-select" id="translationSel" onchange="onTranslationChange()" style="max-width:200px;">
        <option value="">Chargement…</option>
      </select>

      <!-- Book (mobile fallback) -->
      <select class="bible-select" id="bookSel" onchange="onBookChange()" style="max-width:170px;display:none;">
        <option value="">Livre…</option>
      </select>

      <!-- Chapter -->
      <select class="bible-select" id="chapterSel" onchange="loadChapter()" style="max-width:110px;">
        <option value="">Chap…</option>
      </select>

      <!-- Font size -->
      <div class="font-ctrl">
        <button onclick="changeFont(-1)" title="Réduire"><i class="fas fa-font" style="font-size:.6rem;"></i></button>
        <button onclick="changeFont(1)" title="Agrandir"><i class="fas fa-font"></i></button>
      </div>

      <!-- Compare -->
      <button class="ch-btn" id="compareBtn" onclick="toggleCompare()" title="Comparer deux versions" style="width:auto;padding:0 .6rem;font-size:.72rem;gap:.25rem;">
        <i class="fas fa-columns"></i> <span class="d-none d-md-inline">Comparer</span>
      </button>

      <!-- Chapter nav -->
      <div class="chapter-nav">
        <button class="ch-btn" id="prevChBtn" onclick="prevChapter()" disabled><i class="fas fa-chevron-left"></i></button>
        <span class="ch-label" id="chLabel">—</span>
        <button class="ch-btn" id="nextChBtn" onclick="nextChapter()" disabled><i class="fas fa-chevron-right"></i></button>
      </div>
    </div>

    <!-- Reader area (possibly split for compare) -->
    <div class="bible-reader-area">
      <div class="bible-content" id="bibleContent">
        <div class="bible-loading">
          <div class="spinner"></div>
          <div>Chargement de la Bible…</div>
        </div>
      </div>
      <div class="compare-pane" id="comparePane">
        <select class="bible-select mb-3" id="compareTransSel" onchange="loadCompare()" style="width:100%;">
          <option value="">Sélectionner une version…</option>
        </select>
        <div id="compareContent" style="color:var(--bible-muted);font-size:.85rem;">Choisissez une version à comparer.</div>
      </div>
    </div>

  </div>
</div>

<!-- Copy toast -->
<div class="copy-toast" id="copyToast">Verset copié !</div>

<script>
// ── State ─────────────────────────────────────────────────────
const state = {
  translations: {},   // abbr → {language, translation, abbreviation}
  books: [],          // 66 entries: {nr, name, nameFr, chapters}
  translation: 'LSG', // default: Louis Segond (French)
  book: 1,            // 1-66
  chapter: 1,
  fontClass: '',      // '' | 'small' | 'large'
  compareActive: false,
  compareTrans: '',
};

// ── Book data (all 66 books with French names & chapter counts) ──
const BOOKS = [
  // OT
  {nr:1,nameFr:'Genèse',nameEn:'Genesis',chapters:50,ot:true},
  {nr:2,nameFr:'Exode',nameEn:'Exodus',chapters:40,ot:true},
  {nr:3,nameFr:'Lévitique',nameEn:'Leviticus',chapters:27,ot:true},
  {nr:4,nameFr:'Nombres',nameEn:'Numbers',chapters:36,ot:true},
  {nr:5,nameFr:'Deutéronome',nameEn:'Deuteronomy',chapters:34,ot:true},
  {nr:6,nameFr:'Josué',nameEn:'Joshua',chapters:24,ot:true},
  {nr:7,nameFr:'Juges',nameEn:'Judges',chapters:21,ot:true},
  {nr:8,nameFr:'Ruth',nameEn:'Ruth',chapters:4,ot:true},
  {nr:9,nameFr:'1 Samuel',nameEn:'1 Samuel',chapters:31,ot:true},
  {nr:10,nameFr:'2 Samuel',nameEn:'2 Samuel',chapters:24,ot:true},
  {nr:11,nameFr:'1 Rois',nameEn:'1 Kings',chapters:22,ot:true},
  {nr:12,nameFr:'2 Rois',nameEn:'2 Kings',chapters:25,ot:true},
  {nr:13,nameFr:'1 Chroniques',nameEn:'1 Chronicles',chapters:29,ot:true},
  {nr:14,nameFr:'2 Chroniques',nameEn:'2 Chronicles',chapters:36,ot:true},
  {nr:15,nameFr:'Esdras',nameEn:'Ezra',chapters:10,ot:true},
  {nr:16,nameFr:'Néhémie',nameEn:'Nehemiah',chapters:13,ot:true},
  {nr:17,nameFr:'Esther',nameEn:'Esther',chapters:10,ot:true},
  {nr:18,nameFr:'Job',nameEn:'Job',chapters:42,ot:true},
  {nr:19,nameFr:'Psaumes',nameEn:'Psalms',chapters:150,ot:true},
  {nr:20,nameFr:'Proverbes',nameEn:'Proverbs',chapters:31,ot:true},
  {nr:21,nameFr:'Ecclésiaste',nameEn:'Ecclesiastes',chapters:12,ot:true},
  {nr:22,nameFr:'Cantique des Cantiques',nameEn:'Song of Solomon',chapters:8,ot:true},
  {nr:23,nameFr:'Ésaïe',nameEn:'Isaiah',chapters:66,ot:true},
  {nr:24,nameFr:'Jérémie',nameEn:'Jeremiah',chapters:52,ot:true},
  {nr:25,nameFr:'Lamentations',nameEn:'Lamentations',chapters:5,ot:true},
  {nr:26,nameFr:'Ézéchiel',nameEn:'Ezekiel',chapters:48,ot:true},
  {nr:27,nameFr:'Daniel',nameEn:'Daniel',chapters:12,ot:true},
  {nr:28,nameFr:'Osée',nameEn:'Hosea',chapters:14,ot:true},
  {nr:29,nameFr:'Joël',nameEn:'Joel',chapters:3,ot:true},
  {nr:30,nameFr:'Amos',nameEn:'Amos',chapters:9,ot:true},
  {nr:31,nameFr:'Abdias',nameEn:'Obadiah',chapters:1,ot:true},
  {nr:32,nameFr:'Jonas',nameEn:'Jonah',chapters:4,ot:true},
  {nr:33,nameFr:'Michée',nameEn:'Micah',chapters:7,ot:true},
  {nr:34,nameFr:'Nahum',nameEn:'Nahum',chapters:3,ot:true},
  {nr:35,nameFr:'Habacuc',nameEn:'Habakkuk',chapters:3,ot:true},
  {nr:36,nameFr:'Sophonie',nameEn:'Zephaniah',chapters:3,ot:true},
  {nr:37,nameFr:'Aggée',nameEn:'Haggai',chapters:2,ot:true},
  {nr:38,nameFr:'Zacharie',nameEn:'Zechariah',chapters:14,ot:true},
  {nr:39,nameFr:'Malachie',nameEn:'Malachi',chapters:4,ot:true},
  // NT
  {nr:40,nameFr:'Matthieu',nameEn:'Matthew',chapters:28,ot:false},
  {nr:41,nameFr:'Marc',nameEn:'Mark',chapters:16,ot:false},
  {nr:42,nameFr:'Luc',nameEn:'Luke',chapters:24,ot:false},
  {nr:43,nameFr:'Jean',nameEn:'John',chapters:21,ot:false},
  {nr:44,nameFr:'Actes',nameEn:'Acts',chapters:28,ot:false},
  {nr:45,nameFr:'Romains',nameEn:'Romans',chapters:16,ot:false},
  {nr:46,nameFr:'1 Corinthiens',nameEn:'1 Corinthians',chapters:16,ot:false},
  {nr:47,nameFr:'2 Corinthiens',nameEn:'2 Corinthians',chapters:13,ot:false},
  {nr:48,nameFr:'Galates',nameEn:'Galatians',chapters:6,ot:false},
  {nr:49,nameFr:'Éphésiens',nameEn:'Ephesians',chapters:6,ot:false},
  {nr:50,nameFr:'Philippiens',nameEn:'Philippians',chapters:4,ot:false},
  {nr:51,nameFr:'Colossiens',nameEn:'Colossians',chapters:4,ot:false},
  {nr:52,nameFr:'1 Thessaloniciens',nameEn:'1 Thessalonians',chapters:5,ot:false},
  {nr:53,nameFr:'2 Thessaloniciens',nameEn:'2 Thessalonians',chapters:3,ot:false},
  {nr:54,nameFr:'1 Timothée',nameEn:'1 Timothy',chapters:6,ot:false},
  {nr:55,nameFr:'2 Timothée',nameEn:'2 Timothy',chapters:4,ot:false},
  {nr:56,nameFr:'Tite',nameEn:'Titus',chapters:3,ot:false},
  {nr:57,nameFr:'Philémon',nameEn:'Philemon',chapters:1,ot:false},
  {nr:58,nameFr:'Hébreux',nameEn:'Hebrews',chapters:13,ot:false},
  {nr:59,nameFr:'Jacques',nameEn:'James',chapters:5,ot:false},
  {nr:60,nameFr:'1 Pierre',nameEn:'1 Peter',chapters:5,ot:false},
  {nr:61,nameFr:'2 Pierre',nameEn:'2 Pierre',chapters:3,ot:false},
  {nr:62,nameFr:'1 Jean',nameEn:'1 John',chapters:5,ot:false},
  {nr:63,nameFr:'2 Jean',nameEn:'2 John',chapters:1,ot:false},
  {nr:64,nameFr:'3 Jean',nameEn:'3 John',chapters:1,ot:false},
  {nr:65,nameFr:'Jude',nameEn:'Jude',chapters:1,ot:false},
  {nr:66,nameFr:'Apocalypse',nameEn:'Revelation',chapters:22,ot:false},
];

// Preferred translations shown first
const PREFERRED = ['LSG','MARTIN','OSTERVALD','LSB','KJV','CEV','NIV','ESV','NLT','AMP','MSG','NASB','WEB','BSB'];
const LANG_LABELS = {
  fr:'🇫🇷 Français', en:'🇬🇧 English', de:'🇩🇪 Deutsch', es:'🇪🇸 Español',
  pt:'🇧🇷 Português', it:'🇮🇹 Italiano', ru:'🇷🇺 Русский', ar:'🇸🇦 العربية',
  zh:'🇨🇳 中文', ko:'🇰🇷 한국어', ja:'🇯🇵 日本語', nl:'🇳🇱 Nederlands',
  pl:'🇵🇱 Polski', ro:'🇷🇴 Română', sw:'🇰🇪 Swahili', ha:'Hausa', yo:'Yoruba'
};

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderBookList(BOOKS);
  fetchTranslations();
  // show book select on mobile
  if (window.innerWidth < 768) {
    document.getElementById('bookSel').style.display = '';
    populateMobileBookSel();
  }
});

// ── Translations ──────────────────────────────────────────────
async function fetchTranslations() {
  try {
    const r = await fetch('{% url "bible_translations" %}');
    const data = await r.json();
    state.translations = data;
    populateTranslationSel('translationSel', state.translation);
    populateTranslationSel('compareTransSel', '');
    loadChapter();
  } catch(e) {
    console.error('Translations fetch failed', e);
    // fallback: still try to load default
    populateFallbackTranslations();
    loadChapter();
  }
}

function populateFallbackTranslations() {
  const fallback = [
    {abbr:'LSG',name:'Louis Segond (1910)',lang:'fr'},
    {abbr:'MARTIN',name:'Martin (1744)',lang:'fr'},
    {abbr:'OSTERVALD',name:'Ostervald (1744)',lang:'fr'},
    {abbr:'BSB',name:'Berean Study Bible',lang:'en'},
    {abbr:'KJV',name:'King James Version',lang:'en'},
    {abbr:'NIV',name:'New International Version',lang:'en'},
    {abbr:'ESV',name:'English Standard Version',lang:'en'},
  ];
  const sel = document.getElementById('translationSel');
  sel.innerHTML = '';
  fallback.forEach(t => {
    const o = document.createElement('option');
    o.value = t.abbr; o.textContent = t.name;
    if (t.abbr === state.translation) o.selected = true;
    sel.appendChild(o);
  });
}

function populateTranslationSel(selId, defaultVal) {
  const sel = document.getElementById(selId);
  if (!sel) return;
  sel.innerHTML = selId === 'compareTransSel' ? '<option value="">Choisir une version…</option>' : '';

  // group by language
  const byLang = {};
  Object.values(state.translations).forEach(t => {
    const lang = t.language || 'other';
    if (!byLang[lang]) byLang[lang] = [];
    byLang[lang].push(t);
  });

  // sort: fr first, en second, rest alphabetically
  const sortedLangs = Object.keys(byLang).sort((a,b) => {
    if (a==='fr') return -1; if (b==='fr') return 1;
    if (a==='en') return -1; if (b==='en') return 1;
    return a.localeCompare(b);
  });

  sortedLangs.forEach(lang => {
    const label = LANG_LABELS[lang] || lang.toUpperCase();
    const grp = document.createElement('optgroup');
    grp.label = label;
    byLang[lang].sort((a,b)=>a.translation.localeCompare(b.translation)).forEach(t => {
      const o = document.createElement('option');
      o.value = t.abbreviation;
      o.textContent = t.translation;
      if (t.abbreviation === defaultVal) o.selected = true;
      grp.appendChild(o);
    });
    sel.appendChild(grp);
  });
}

// ── Book list ─────────────────────────────────────────────────
function renderBookList(books) {
  const list = document.getElementById('bookList');
  list.innerHTML = '';
  let lastOT = null;
  books.forEach(b => {
    if (lastOT === null || lastOT !== b.ot) {
      const lbl = document.createElement('div');
      lbl.className = 'bible-section-label';
      lbl.textContent = b.ot ? 'Ancien Testament' : 'Nouveau Testament';
      list.appendChild(lbl);
      lastOT = b.ot;
    }
    const btn = document.createElement('button');
    btn.className = 'book-btn' + (b.nr === state.book ? ' active' : '');
    btn.dataset.nr = b.nr;
    btn.textContent = b.nameFr;
    btn.onclick = () => selectBook(b.nr);
    list.appendChild(btn);
  });
}

function filterBooks(q) {
  q = q.toLowerCase();
  const filtered = q ? BOOKS.filter(b => b.nameFr.toLowerCase().includes(q) || b.nameEn.toLowerCase().includes(q)) : BOOKS;
  renderBookList(filtered);
}

function selectBook(nr) {
  state.book = nr;
  state.chapter = 1;
  document.querySelectorAll('.book-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.nr) === nr));
  populateChapterSel();
  loadChapter();
}

function populateMobileBookSel() {
  const sel = document.getElementById('bookSel');
  sel.innerHTML = '';
  BOOKS.forEach(b => {
    const o = document.createElement('option');
    o.value = b.nr; o.textContent = b.nameFr;
    if (b.nr === state.book) o.selected = true;
    sel.appendChild(o);
  });
}

// ── Chapter selector ──────────────────────────────────────────
function populateChapterSel() {
  const book = BOOKS.find(b => b.nr === state.book);
  if (!book) return;
  const sel = document.getElementById('chapterSel');
  sel.innerHTML = '';
  for (let i = 1; i <= book.chapters; i++) {
    const o = document.createElement('option');
    o.value = i; o.textContent = 'Chap. ' + i;
    if (i === state.chapter) o.selected = true;
    sel.appendChild(o);
  }
}

// ── Event handlers ────────────────────────────────────────────
function onTranslationChange() {
  state.translation = document.getElementById('translationSel').value;
  loadChapter();
  if (state.compareActive) loadCompare();
}
function onBookChange() {
  selectBook(parseInt(document.getElementById('bookSel').value));
}
function prevChapter() { if (state.chapter > 1) { state.chapter--; syncChapterSel(); loadChapter(); } }
function nextChapter() {
  const book = BOOKS.find(b => b.nr === state.book);
  if (book && state.chapter < book.chapters) { state.chapter++; syncChapterSel(); loadChapter(); }
}
function syncChapterSel() {
  const sel = document.getElementById('chapterSel');
  sel.value = state.chapter;
}

// ── Load chapter ──────────────────────────────────────────────
let loadController = null;
async function loadChapter() {
  const ch = parseInt(document.getElementById('chapterSel').value) || state.chapter;
  state.chapter = ch;

  // Update nav UI
  const book = BOOKS.find(b => b.nr === state.book);
  const label = book ? `${book.nameFr} ${state.chapter}` : '';
  document.getElementById('chLabel').textContent = label;
  document.getElementById('prevChBtn').disabled = state.chapter <= 1;
  document.getElementById('nextChBtn').disabled = !book || state.chapter >= book.chapters;

  // Populate chapter select if empty
  const sel = document.getElementById('chapterSel');
  if (!sel.options.length || parseInt(sel.value) !== state.chapter) populateChapterSel();

  showLoading();

  if (loadController) loadController.abort();
  loadController = new AbortController();

  try {
    const url = `/api/bible/${state.translation}/${state.book}/${state.chapter}/`;
    const r = await fetch(url, { signal: loadController.signal });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    renderChapter(data);
    if (state.compareActive && state.compareTrans) loadCompare();
  } catch(e) {
    if (e.name === 'AbortError') return;
    document.getElementById('bibleContent').innerHTML = `
      <div class="bible-loading">
        <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--orange);"></i>
        <div style="margin-top:.75rem;">Impossible de charger ce passage.<br><small style="color:var(--bible-muted);">Vérifiez votre connexion ou choisissez une autre version.</small></div>
      </div>`;
  }
}

function showLoading() {
  document.getElementById('bibleContent').innerHTML = `<div class="bible-loading"><div class="spinner"></div><div>Chargement…</div></div>`;
}

function renderChapter(data) {
  const book = BOOKS.find(b => b.nr === state.book);
  const bookName = book ? book.nameFr : (data.book_name || '');
  const verses = data.verses || {};
  let html = `
    <div class="bible-chapter-title">Chapitre ${state.chapter}</div>
    <div class="bible-book-label">${bookName} — ${getTranslationName()}</div>`;
  Object.entries(verses).forEach(([vNum, vData]) => {
    const text = typeof vData === 'object' ? (vData.text || '') : vData;
    html += `<div class="verse-row" onclick="highlightVerse(this, ${vNum}, \`${escJ(text)}\`)">
      <span class="verse-num">${vNum}</span>
      <span class="verse-text ${state.fontClass}">${text}</span>
    </div>`;
  });
  document.getElementById('bibleContent').innerHTML = html;
}

function getTranslationName() {
  if (state.translations[state.translation]) return state.translations[state.translation].translation;
  return state.translation.toUpperCase();
}

// ── Verse interaction ─────────────────────────────────────────
function highlightVerse(el, num, text) {
  document.querySelectorAll('.verse-row.highlighted').forEach(r => r.classList.remove('highlighted'));
  el.classList.add('highlighted');
  const book = BOOKS.find(b => b.nr === state.book);
  const ref = `${book ? book.nameFr : ''} ${state.chapter}:${num}`;
  navigator.clipboard.writeText(`${ref} — ${text}`).then(() => showToast('Verset copié !')).catch(()=>{});
}

function showToast(msg) {
  const t = document.getElementById('copyToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Font size ─────────────────────────────────────────────────
const FONTS = ['small', '', 'large'];
let fontIdx = 1;
function changeFont(dir) {
  fontIdx = Math.max(0, Math.min(2, fontIdx + dir));
  state.fontClass = FONTS[fontIdx];
  document.querySelectorAll('.verse-text').forEach(el => { el.className = 'verse-text ' + state.fontClass; });
}

// ── Compare ───────────────────────────────────────────────────
function toggleCompare() {
  state.compareActive = !state.compareActive;
  document.getElementById('comparePane').classList.toggle('active', state.compareActive);
  document.getElementById('compareBtn').style.borderColor = state.compareActive ? 'var(--green)' : '';
  if (state.compareActive && state.compareTrans) loadCompare();
}

async function loadCompare() {
  const sel = document.getElementById('compareTransSel');
  state.compareTrans = sel.value;
  if (!state.compareTrans) return;
  const pane = document.getElementById('compareContent');
  pane.innerHTML = '<div class="bible-loading"><div class="spinner" style="width:24px;height:24px;"></div></div>';
  try {
    const url = `/api/bible/${state.compareTrans}/${state.book}/${state.chapter}/`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const verses = data.verses || {};
    const transName = state.translations[state.compareTrans] ? state.translations[state.compareTrans].translation : state.compareTrans.toUpperCase();
    let html = `<div style="font-size:.75rem;color:var(--green);font-weight:600;margin-bottom:1rem;">${transName}</div>`;
    Object.entries(verses).forEach(([vNum, vData]) => {
      const text = typeof vData === 'object' ? (vData.text || '') : vData;
      html += `<div class="verse-row"><span class="verse-num">${vNum}</span><span class="verse-text small">${text}</span></div>`;
    });
    pane.innerHTML = html;
  } catch(e) {
    pane.innerHTML = `<p style="color:var(--bible-muted);font-size:.82rem;">Impossible de charger cette version.</p>`;
  }
}

// ── Helpers ───────────────────────────────────────────────────
function escJ(s) { return s.replace(/`/g,'\\`').replace(/\$/g,'\\$'); }

// Init chapter selector on page load
populateChapterSel();
</script>
