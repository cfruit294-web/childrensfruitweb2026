{% for t in items %}
<div class="cf-testi-card">
  <div class="cf-testi-stars">
    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
    <i class="fas fa-star"></i><i class="fas fa-star"></i>
  </div>
  <p class="cf-testi-text">« {{ t.content }} »</p>
  <div class="d-flex align-items-center gap-2">
    {% if t.avatar %}
      <img src="{{ t.avatar.url }}" alt="{{ t.name }}" class="cf-testi-avatar">
    {% else %}
      <div class="cf-testi-avatar-placeholder"><i class="fas fa-user"></i></div>
    {% endif %}
    <div>
      <div class="cf-testi-name">{{ t.name }}</div>
      <div class="cf-testi-role">{{ t.role }}</div>
    </div>
  </div>
</div>
{% empty %}

  </div>
  <p class="cf-testi-text">« {{ t.content }} »</p>
  <div class="d-flex align-items-center gap-2">
    <div class="cf-testi-avatar-placeholder"><i class="fas fa-user"></i></div>
    <div>
      <div class="cf-testi-name">{{ t.name }}</div>
      <div class="cf-testi-role">{{ t.role }}</div>
    </div>
  </div>
</div>
{% endfor %}
{% endfor %}
